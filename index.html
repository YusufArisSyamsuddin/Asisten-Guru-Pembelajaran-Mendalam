const { useState, useEffect, useRef } = React;

const Card = ({ children, className = "" }) => (<div className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${className}`}>{children}</div>);

const Accordion = ({ title, icon, subtitle, children, defaultOpen = false, isCompleted, onToggleComplete, headerColorClass = "bg-blue-100 text-blue-700" }) => {
  const [isOpen, setIsOpen] = useState(defaultOpen);
  return (
    <Card className={`mb-5 transition-all duration-300 ${isCompleted ? 'border-l-4 border-l-green-500 opacity-80 bg-slate-50' : 'border-l-4 border-l-blue-600'}`}>
      <div className="flex items-center justify-between p-4 hover:bg-slate-50 cursor-pointer" onClick={() => setIsOpen(!isOpen)}>
        <div className="flex-1 flex items-center space-x-4 text-left">
          <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-sm ${isCompleted ? 'bg-green-100 text-green-700' : headerColorClass}`}>
            <i className={`${icon} text-xl`}></i>
          </div>
          <div>
            <h3 className={`font-bold text-lg ${isCompleted ? 'text-green-800 line-through decoration-green-400' : 'text-slate-800'}`}>{title}</h3>
            {subtitle && <p className="text-sm font-medium text-slate-500 mt-0.5">{subtitle}</p>}
          </div>
        </div>
        <div className="flex items-center space-x-3" onClick={(e) => e.stopPropagation()}>
          <button onClick={onToggleComplete} className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-colors shadow-sm ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 bg-white text-transparent hover:border-green-400'}`} title="Tandai Selesai">✓</button>
          <button onClick={() => setIsOpen(!isOpen)} className="p-2">{isOpen ? <i className="fas fa-chevron-up text-slate-500"></i> : <i className="fas fa-chevron-down text-slate-500"></i>}</button>
        </div>
      </div>
      {isOpen && <div className="p-5 border-t border-slate-200 bg-white overflow-x-auto">{children}</div>}
    </Card>
  );
};

const LabelWithHint = ({ children, hint, className="block text-slate-700 font-semibold mb-1" }) => {
  const [showHint, setShowHint] = useState(false);
  return (
    <div className="mb-1 w-full">
      <div className="flex items-center justify-between">
        <label className={className}>{children}</label>
        {hint && <button type="button" onClick={() => setShowHint(!showHint)} className={`ml-2 shrink-0 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded transition-colors flex items-center shadow-sm ${showHint ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-white border border-slate-300 text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`} title="Klik untuk bantuan pengisian"><i className={`fas ${showHint ? 'fa-times' : 'fa-info-circle'} mr-1`}></i> {showHint ? 'Tutup' : 'Petunjuk'}</button>}
      </div>
      {showHint && <div className="mt-2 mb-3 p-3 bg-blue-50/80 border border-blue-200 text-blue-800 text-xs rounded-lg shadow-inner leading-relaxed"><i className="fas fa-lightbulb text-yellow-500 mr-2 text-sm"></i>{hint}</div>}
    </div>
  );
};

const MultiSelectDropdown = ({ options, selectedOptions, toggleOption }) => {
  const [isOpen, setIsOpen] = useState(false);
  const dropdownRef = useRef(null);
  useEffect(() => {
    function handleClickOutside(event) { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [dropdownRef]);

  return (
    <div className="relative" ref={dropdownRef}>
      <button type="button" onClick={() => setIsOpen(!isOpen)} className="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 bg-white text-left flex justify-between items-center shadow-sm transition-colors hover:bg-slate-50">
        <span className="truncate pr-4 text-slate-700 font-medium">{selectedOptions.length > 0 ? selectedOptions.join(', ') : '-- Klik untuk memilih Praktik Pedagogis (Bisa lebih dari 1) --'}</span>
        <div className="flex items-center">
          {selectedOptions.length > 0 && <span className="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-1 rounded-full mr-2">{selectedOptions.length} Dipilih</span>}
          <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'} text-slate-500`}></i>
        </div>
      </button>
      {isOpen && (
        <div className="absolute z-50 mt-2 w-full bg-white border border-indigo-200 rounded-lg shadow-xl max-h-96 overflow-y-auto dropdown-animate">
          <div className="p-2 bg-indigo-50 text-xs text-indigo-800 font-bold border-b border-indigo-100 sticky top-0 z-10"><i className="fas fa-check-square mr-1"></i> Centang model/strategi yang digunakan:</div>
          {options.map((opt) => (
            <div key={opt.id} className={`p-3 border-b border-slate-100 cursor-pointer flex items-start space-x-3 transition-colors ${selectedOptions.includes(opt.title) ? 'bg-indigo-50/50' : 'hover:bg-slate-50'}`} onClick={() => toggleOption(opt.title)}>
              <input type="checkbox" className="mt-1 w-4 h-4 text-indigo-600 rounded cursor-pointer border-slate-300" checked={selectedOptions.includes(opt.title)} readOnly />
              <div className="flex-1">
                <div className={`text-sm font-bold ${selectedOptions.includes(opt.title) ? 'text-indigo-800' : 'text-slate-800'}`}>{opt.title}</div>
                <div className="text-xs text-slate-500 mt-1 leading-snug">{opt.desc}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

    tahunPelajaran: "2025/2026", mapel: "Ilmu Pengetahuan Alam (IPA)", kelas: "Fase D / Kelas VIII", topik: "Pengenalan Sel", waktu: "2 x 40 Menit", jumlahPertemuan: "1 Pertemuan",
    kompetensiAwal: "Peserta didik telah mempelajari Teori Sel dan familiar dalam menggunakan mikroskop.", kesiapanSiswa: "Mayoritas siswa terbiasa dengan lingkungan agraris.",

                          <div>
                            <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Pengalaman mengonstruksi pemahaman (Esensial, Aplikatif, Karakter).">Target Kognitif (Memahami)</LabelWithHint>
                            <textarea name="pengalamanMemahami" value={rppData.pengalamanMemahami} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                          <div>
                              <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Pemetaan cepat kemampuan/kesiapan awal (Kuis Lisan/Diagnostik).">Asesmen Awal</LabelWithHint>
                              <textarea name="asesmenAwal" value={rppData.asesmenAwal} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div className="bg-white p-5 rounded-lg border border-emerald-200 shadow-sm">
                      <h4 className="font-bold text-slate-800 mb-3">Bagian 2: Inti</h4>
                      <div className="space-y-4">
                        <div>
                          <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Sebutkan alur kerja utama siswa dan metode pengajaran Bapak/Ibu (Kerja kelompok, Praktikum mikroskop, Presentasi, dll).">Aktivitas Kelas (Langkah Fisik)</LabelWithHint>
                          <textarea name="kegiatanInti" value={rppData.kegiatanInti} onChange={handleInputChange} rows="5" className="w-full p-3 border border-slate-300 rounded focus:ring-2 bg-slate-50 outline-none"></textarea>
                        </div>
                        <div className="grid lg:grid-cols-2 gap-4">
                          <div>
                            <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Penerapan konsep pada situasi nyata, eksperimen, diskusi, atau proyek.">Target Kognitif (Mengaplikasi)</LabelWithHint>
                            <textarea name="pengalamanMengaplikasi" value={rppData.pengalamanMengaplikasi} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                          <div>
                            <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Observasi unjuk kerja atau kuis pemahaman selama kegiatan (Formatif).">Asesmen Proses</LabelWithHint>
                            <textarea name="asesmenProses" value={rppData.asesmenProses} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div className="bg-white p-5 rounded-lg border border-emerald-200 shadow-sm">
                      <h4 className="font-bold text-slate-800 mb-3">Bagian 3: Penutup</h4>
                      <div className="space-y-4">
                        <div>
                          <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Aktivitas di akhir pelajaran (Misal: Menyusun kesimpulan bersama, guru memberikan apresiasi dan tugas lanjutan, doa).">Aktivitas Kelas (Langkah Fisik)</LabelWithHint>
                          <textarea name="kegiatanPenutup" value={rppData.kegiatanPenutup} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 bg-slate-50 outline-none"></textarea>
                        </div>
                        <div className="grid lg:grid-cols-2 gap-4">
                          <div>
                            <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Kegiatan regulasi diri, evaluasi mandiri, dan apresiasi proses belajar.">Target Kognitif (Merefleksi)</LabelWithHint>
                            <textarea name="pengalamanMerefleksi" value={rppData.pengalamanMerefleksi} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                          <div>
                            <LabelWithHint className="font-bold text-xs uppercase text-slate-600" hint="Bukti penguasaan materi (Exit Ticket, Tes Tertulis, atau Lembar Refleksi).">Asesmen Akhir</LabelWithHint>
                            <textarea name="asesmenAkhir" value={rppData.asesmenAkhir} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 outline-none"></textarea>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </Card>

                <Card className="p-6 border-t-4 border-t-orange-500 bg-orange-50/30">
                  <h4 className="font-bold text-orange-900 text-lg mb-4">Lampiran Instrumen Penilaian</h4>
                  <div className="mb-6 bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                    <LabelWithHint className="font-bold text-slate-800 text-base mb-2">1. Tabel Kisi-kisi Soal</LabelWithHint>
                    <div className="overflow-x-auto border border-slate-300 rounded"><table className="w-full text-left text-sm border-collapse"><thead className="bg-slate-100 text-slate-700 border-b border-slate-300"><tr><th className="p-2 border-r w-12 text-center">No</th><th className="p-2 border-r w-1/4">Materi Pokok</th><th className="p-2 border-r w-1/3">Indikator Soal</th><th className="p-2 border-r w-24 text-center">Level</th><th className="p-2 border-r w-28 text-center">Bentuk</th><th className="p-2 border-r w-24 text-center">No Soal</th><th className="p-2 w-12"></th></tr></thead><tbody>{rppData.kisiKisi.map((row, index) => (<tr key={row.id} className="border-b hover:bg-slate-50"><td className="p-1 border-r text-center text-slate-500">{index + 1}</td><td className="p-1 border-r"><input type="text" className="table-input" value={row.materi} onChange={(e) => handleTableChange('kisiKisi', index, 'materi', e.target.value)} placeholder="Materi..." /></td><td className="p-1 border-r"><input type="text" className="table-input" value={row.indikator} onChange={(e) => handleTableChange('kisiKisi', index, 'indikator', e.target.value)} placeholder="Siswa dapat..." /></td><td className="p-1 border-r"><select className="table-input text-center" value={row.level} onChange={(e) => handleTableChange('kisiKisi', index, 'level', e.target.value)}><option value="">-Level-</option><option value="C1">C1</option><option value="C2">C2</option><option value="C3">C3</option><option value="C4">C4</option><option value="C5">C5</option><option value="C6">C6</option></select></td><td className="p-1 border-r"><select className="table-input text-center" value={row.bentuk} onChange={(e) => handleTableChange('kisiKisi', index, 'bentuk', e.target.value)}><option value="">-Bentuk-</option><option value="PG">PG</option><option value="PG Kompleks">PG Kompleks</option><option value="Menjodohkan">Menjodohkan</option><option value="Isian Singkat">Isian Singkat</option><option value="Uraian">Uraian</option><option value="Praktik">Praktik</option><option value="Proyek">Proyek</option></select></td><td className="p-1 border-r"><input type="text" className="table-input text-center" value={row.nomor} onChange={(e) => handleTableChange('kisiKisi', index, 'nomor', e.target.value)} placeholder="1" /></td><td className="p-1 text-center"><button onClick={() => removeTableRow('kisiKisi', row.id)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash"></i></button></td></tr>))}</tbody></table></div>
                    <button onClick={() => addTableRow('kisiKisi', { materi: "", indikator: "", level: "", bentuk: "", nomor: "" })} className="mt-3 px-4 py-2 bg-orange-50 text-sm font-bold text-orange-600 rounded-lg hover:bg-orange-100 flex items-center"><i className="fas fa-plus mr-2"></i> Tambah Baris</button>
                  </div>

                  <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm mb-6">
                    <LabelWithHint className="font-bold text-slate-800 text-base mb-2" hint="Ketik opsi jawaban di kolom pilihan (A, B, C, D atau pernyataan jodoh) untuk soal PG, PG Kompleks, dan Menjodohkan. Kosongkan untuk soal Uraian.">2. Bank Soal (Mendukung PG & Menjodohkan)</LabelWithHint>
                    <div className="overflow-x-auto border border-slate-300 rounded"><table className="w-full text-left text-sm border-collapse"><thead className="bg-slate-100 text-slate-700 border-b border-slate-300"><tr><th className="p-2 border-r w-10 text-center">No</th><th className="p-2 border-r w-[40%]">Butir Soal / Pertanyaan</th><th className="p-2 border-r w-[35%]">Pilihan Jawaban / Pernyataan</th><th className="p-2 border-r w-24 text-center">Kunci</th><th className="p-2 w-10"></th></tr></thead><tbody>{rppData.bankSoal.map((row, index) => (<tr key={row.id} className="border-b hover:bg-slate-50"><td className="p-2 border-r text-center text-slate-500 align-top">{index + 1}</td><td className="p-1 border-r align-top"><textarea className="table-input resize-y min-h-[70px]" rows="3" value={row.soal} onChange={(e) => handleTableChange('bankSoal', index, 'soal', e.target.value)} placeholder="Tuliskan soal..."></textarea></td><td className="p-1 border-r align-top"><textarea className="table-input resize-y min-h-[70px]" rows="3" value={row.opsi} onChange={(e) => handleTableChange('bankSoal', index, 'opsi', e.target.value)} placeholder="A. ...&#10;B. ...&#10;C. ...&#10;(Kosongkan jika uraian)"></textarea></td><td className="p-1 border-r align-top"><input type="text" className="table-input font-bold text-center mt-1" value={row.kunci} onChange={(e) => handleTableChange('bankSoal', index, 'kunci', e.target.value)} placeholder="Kunci" /></td><td className="p-2 text-center align-top"><button onClick={() => removeTableRow('bankSoal', row.id)} className="text-red-400 hover:text-red-600 mt-2"><i className="fas fa-trash"></i></button></td></tr>))}</tbody></table></div>
                    <button onClick={() => addTableRow('bankSoal', { soal: "", opsi: "", kunci: "" })} className="mt-3 px-4 py-2 bg-orange-50 text-sm font-bold text-orange-600 rounded-lg hover:bg-orange-100 flex items-center"><i className="fas fa-plus mr-2"></i> Tambah Soal</button>
                  </div>

                  <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                    <LabelWithHint className="font-bold text-slate-800 text-base mb-2">3. Rubrik Penilaian</LabelWithHint>
                    <div className="overflow-x-auto border border-slate-300 rounded"><table className="w-full text-left text-sm border-collapse"><thead className="bg-slate-100 text-slate-700 border-b border-slate-300"><tr><th className="p-2 border-r w-1/3">Skor / Kriteria</th><th className="p-2 border-r">Deskripsi</th><th className="p-2 w-12 text-center"></th></tr></thead><tbody>{rppData.rubrikPenilaian.map((row, index) => (<tr key={row.id} className="border-b hover:bg-slate-50"><td className="p-1 border-r align-top"><input type="text" className="table-input font-bold" value={row.skor} onChange={(e) => handleTableChange('rubrikPenilaian', index, 'skor', e.target.value)} placeholder="Skor..." /></td><td className="p-1 border-r align-top"><textarea className="table-input resize-y min-h-[50px]" rows="2" value={row.kriteria} onChange={(e) => handleTableChange('rubrikPenilaian', index, 'kriteria', e.target.value)} placeholder="Deskripsi..."></textarea></td><td className="p-2 text-center align-top"><button onClick={() => removeTableRow('rubrikPenilaian', row.id)} className="text-red-400 hover:text-red-600 mt-1"><i className="fas fa-trash"></i></button></td></tr>))}</tbody></table></div>
                    <button onClick={() => addTableRow('rubrikPenilaian', { skor: "", kriteria: "" })} className="mt-3 px-4 py-2 bg-orange-50 text-sm font-bold text-orange-600 rounded-lg hover:bg-orange-100 flex items-center"><i className="fas fa-plus mr-2"></i> Tambah Rubrik</button>
                  </div>
                </Card>

                <Card className="p-6 border-t-4 border-t-red-500 bg-red-50/30">
                  <h3 className="font-bold text-red-900 text-lg mb-4 border-b border-red-200 pb-2"><span className="bg-red-600 text-white px-2 py-0.5 rounded text-sm mr-2">TAHAP 5</span> Refleksi Guru (Siklus Akhir)</h3>
                  <textarea name="catatanRefleksi" value={rppData.catatanRefleksi} onChange={handleInputChange} rows="3" className="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-red-500 outline-none bg-white shadow-sm" placeholder="Tuliskan evaluasi pribadi Bapak/Ibu setelah mengajar kelas ini..."></textarea>
                </Card>
              </div>
            ) : (
              <div>
                <Card className="mb-6 border-t-4 border-t-slate-800">
                  <div className="p-5 bg-white">
                    <h3 className="font-bold text-slate-800 text-lg mb-4 border-b pb-2">Informasi Umum</h3>
                    <div className="grid grid-cols-2 gap-6 text-base text-slate-700">
                      <div className="col-span-2 md:col-span-1 border-l-4 border-blue-500 bg-blue-50 p-3 rounded-r-lg"><strong className="block text-slate-500 text-sm uppercase mb-1">Mata Pelajaran</strong><span className="font-bold text-blue-900 text-lg">{rppData.mapel} <span className="text-sm text-blue-600">({rppData.kelas})</span></span></div>
                      <div className="col-span-2 md:col-span-1 border-l-4 border-indigo-500 bg-indigo-50 p-3 rounded-r-lg"><strong className="block text-slate-500 text-sm uppercase mb-1">Topik Pembelajaran</strong><span className="font-bold text-indigo-900 text-lg">{rppData.topik}</span></div>
                      <div><strong className="block text-slate-500 text-sm uppercase mb-1">Penyusun</strong>{rppData.namaGuru}</div><div><strong className="block text-slate-500 text-sm uppercase mb-1">Sekolah</strong>{rppData.namaSekolah}</div>
                      <div><strong className="block text-slate-500 text-sm uppercase mb-1">Waktu / Pertemuan</strong>{rppData.waktu} / {rppData.jumlahPertemuan}</div><div><strong className="block text-slate-500 text-sm uppercase mb-1">Tahun Pelajaran</strong>{rppData.tahunPelajaran}</div>
                    </div>
                  </div>
                </Card>

                <Accordion title="TAHAP 1: Identifikasi" icon="fas fa-search" defaultOpen={true} isCompleted={completedSteps['t1']} onToggleComplete={() => toggleStep('t1')} headerColorClass="bg-blue-100 text-blue-700">
                  <div className="space-y-4 text-base text-slate-700">
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200"><strong className="block text-blue-800 mb-2">Kesiapan Siswa</strong><p className="whitespace-pre-wrap">{rppData.kesiapanSiswa||"-"}</p></div>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200"><strong className="block text-blue-800 mb-2">Materi Pelajaran</strong><p className="whitespace-pre-wrap">{rppData.karakteristikMateri||"-"}</p></div>
                    <div className="grid lg:grid-cols-2 gap-4">
                      <div className="bg-slate-50 p-4 rounded-lg border"><strong className="block text-blue-800 mb-3">Profil Lulusan</strong><div className="grid grid-cols-2 gap-2 text-sm">{Object.keys(profilLabels).map(k=>rppData.profilLulusan[k]&&<div key={k} className="flex items-center text-blue-900 font-medium bg-white p-2 rounded border"><i className="fas fa-check-square text-blue-600 mr-2"></i>{profilLabels[k]}</div>)}</div></div>
                      <div className="bg-blue-50 p-4 rounded-lg border"><strong className="block text-blue-900 mb-3"><i className="fas fa-heart text-red-500 mr-2"></i>CASEL</strong><div className="grid grid-cols-2 gap-2 text-sm">{Object.keys(kseLabels).map(k=>rppData.kseLulusan[k]&&<div key={`v-${k}`} className="flex items-center text-blue-900 font-bold bg-white p-2 rounded border"><i className="fas fa-star text-yellow-500 mr-2"></i>{kseLabels[k]}</div>)}</div></div>
                    </div>
                  </div>
                </Accordion>

                <Accordion title="TAHAP 2: Desain Pembelajaran" icon="fas fa-drafting-compass" isCompleted={completedSteps['t2']} onToggleComplete={() => toggleStep('t2')} headerColorClass="bg-indigo-100 text-indigo-700">
                  <div className="space-y-6 text-base text-slate-700">
                    <div className="grid lg:grid-cols-2 gap-6"><div className="p-4 border-l-4 border-indigo-400 bg-white shadow-sm"><strong className="block text-indigo-900 mb-2">Capaian Pembelajaran</strong><p className="whitespace-pre-wrap">{rppData.cp||"-"}</p></div><div className="p-4 border-l-4 border-indigo-500 bg-white shadow-sm"><strong className="block text-indigo-900 mb-2">Tujuan Pembelajaran</strong><p className="whitespace-pre-wrap font-medium">{rppData.tp||"-"}</p></div></div>
                    <div className="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100"><h4 className="font-bold text-indigo-900 border-b pb-2 mb-4">Kerangka Pembelajaran</h4><div className="grid md:grid-cols-2 gap-4"><div className="bg-white p-4 rounded-lg border"><strong className="block text-indigo-700 mb-1 text-xs">Praktik Pedagogis</strong><p className="font-medium">{getFinalPraktikString()}</p></div><div className="bg-white p-4 rounded-lg border"><strong className="block text-indigo-700 mb-1 text-xs">Kemitraan Belajar</strong><p>{rppData.kemitraanPembelajaran||"-"}</p></div><div className="bg-white p-4 rounded-lg border"><strong className="block text-indigo-700 mb-1 text-xs">Lingkungan Belajar</strong><p>{rppData.lingkunganPembelajaran||"-"}</p></div><div className="bg-white p-4 rounded-lg border"><strong className="block text-indigo-700 mb-1 text-xs">Pemanfaatan Digital</strong><p>{rppData.pemanfaatanDigital||"-"}</p></div></div></div>
                  </div>
                </Accordion>

                <Accordion title="TAHAP 3 & 4: Panduan Eksekusi Kelas" icon="fas fa-layer-group" isCompleted={completedSteps['t34']} onToggleComplete={() => toggleStep('t34')} headerColorClass="bg-emerald-100 text-emerald-800">
                  <div className="space-y-8 text-base">
                    {[{t:"AWAL",sub:"Pendahuluan",c:"blue",ak:rppData.kegiatanAwal,tk:rppData.pengalamanMemahami,as:rppData.asesmenAwal,ic:"brain"},{t:"INTI",sub:"Elaborasi",c:"emerald",ak:rppData.kegiatanInti,tk:rppData.pengalamanMengaplikasi,as:rppData.asesmenProses,ic:"cogs"},{t:"AKHIR",sub:"Penutup",c:"fuchsia",ak:rppData.kegiatanPenutup,tk:rppData.pengalamanMerefleksi,as:rppData.asesmenAkhir,ic:"undo"}].map((f,i)=>(
                      <div key={i} className={`border-2 border-${f.c}-200 rounded-xl overflow-hidden bg-white`}><div className={`bg-${f.c}-50 px-5 py-3 border-b-2 border-${f.c}-200 flex items-center`}><span className={`bg-${f.c}-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold mr-3`}>{i+1}</span><h4 className={`font-black text-${f.c}-900`}>FASE {f.t} <span className="font-normal opacity-75">| {f.sub}</span></h4></div><div><div className="p-5 border-b bg-slate-50"><span className="inline-flex px-2 py-1 rounded bg-slate-200 text-xs font-bold mb-3"><i className="fas fa-running mr-1"></i> Aktivitas</span><p className="whitespace-pre-wrap">{f.ak}</p></div><div className="flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x"><div className={`flex-1 p-5 bg-${f.c}-50/30`}><span className={`inline-flex px-2 py-1 rounded bg-${f.c}-200 text-xs font-bold mb-3`}><i className={`fas fa-${f.ic} mr-1`}></i> Target</span><p className="whitespace-pre-wrap">{f.tk}</p></div><div className="flex-1 p-5 bg-orange-50/30"><span className="inline-flex px-2 py-1 rounded bg-orange-200 text-xs font-bold mb-3"><i className="fas fa-check mr-1"></i> Asesmen</span><p className="whitespace-pre-wrap font-medium">{f.as}</p></div></div></div></div>
                    ))}
                  </div>
                </Accordion>

                <Card className="mb-6 border-t-4 border-t-orange-500">
                  <div className="p-5 bg-white">
                    <h3 className="font-bold text-orange-800 text-lg mb-4 border-b pb-2">Instrumen Penilaian (Bank Soal)</h3>
                    <div className="overflow-x-auto border border-slate-300 rounded">
                      <table className="w-full text-left text-sm border-collapse">
                        <thead className="bg-slate-100 text-slate-700 border-b border-slate-300"><tr><th className="p-2 border-r w-10 text-center">No</th><th className="p-2 border-r">Butir Soal & Pilihan / Pernyataan</th><th className="p-2 w-32 text-center">Kunci</th></tr></thead>
                        <tbody>{rppData.bankSoal.map((r, i) => (<tr key={r.id} className="border-b"><td className="p-2 border-r text-center align-top">{i+1}</td><td className="p-3 border-r align-top"><div className="whitespace-pre-wrap font-medium">{r.soal}</div>{r.opsi && <div className="mt-2 text-slate-600 bg-slate-50 p-2 rounded border text-xs whitespace-pre-wrap leading-relaxed">{r.opsi}</div>}</td><td className="p-2 text-center align-top font-bold text-blue-700 bg-blue-50/30">{r.kunci||'-'}</td></tr>))}</tbody>
                      </table>
                    </div>
                  </div>
                </Card>

                {rppData.catatanRefleksi && <Card className="mb-6 border-t-4 border-t-red-500"><div className="p-5 bg-white"><h3 className="font-bold text-red-800 text-lg mb-2"><i className="fas fa-pen-nib mr-2"></i>Catatan Refleksi</h3><p className="whitespace-pre-wrap p-4 bg-red-50 rounded-lg border">{rppData.catatanRefleksi}</p></div></Card>}
              </div>
            )}
          </div>
        </div>

        <div className="w-full md:w-72 shrink-0 order-1 md:order-2 relative md:sticky top-6 z-50">
          <div className="bg-white p-4 rounded-2xl shadow-lg border-2 border-blue-100 flex flex-col space-y-3">
            <div className="pb-3 border-b"><h4 className="font-bold flex items-center"><i className="fas fa-cog text-blue-500 mr-2"></i> Kontrol</h4><p className="text-xs mt-1">Status: {isEditing ? <span className="text-orange-500 font-bold">Mengedit</span> : <span className="text-green-500 font-bold">Tersimpan</span>}</p></div>
            {isEditing ? <button onClick={() => setIsEditing(false)} className="py-3 bg-green-600 text-white rounded-xl text-sm font-bold w-full"><i className="fas fa-save mr-2"></i> Simpan Modul</button> : <><div className="flex space-x-2 w-full"><button onClick={() => setIsEditing(true)} className="flex-1 py-3 bg-slate-100 rounded-xl text-sm font-bold border"><i className="fas fa-edit"></i> Edit</button><button onClick={resetRppData} className="flex-1 py-3 bg-red-50 text-red-600 rounded-xl text-sm font-bold border"><i className="fas fa-trash-alt"></i> Hapus</button></div><button onClick={handleDownloadWord} className="btn-word py-3 bg-blue-600 text-white rounded-xl text-sm font-bold w-full"><i className="fas fa-file-word mr-2"></i> Unduh Word</button></>}
          </div>
        </div>
      </main>

      {/* FOOTER KHUSUS APLIKASI WEB */}
      <footer className="max-w-6xl mx-auto px-4 mt-12 pb-6 text-center text-slate-500 text-sm w-full">
        <div className="border-t border-slate-300 pt-6">
           <p className="font-bold text-slate-600 text-base mb-1">Dikembangkan oleh: YUSUF ARIS SYAMSUDDIN</p>
           <p className="font-medium">ID: 0762773674130202 | Guru IPA & Informatika - SMPN 2 Secang</p>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
